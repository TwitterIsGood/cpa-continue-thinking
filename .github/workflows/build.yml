name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin-go
    strategy:
      matrix:
        target:
          - os: linux
            arch: amd64
            cc_target: x86_64-linux-gnu
            artifact: codex-continue-thinking-linux-amd64.so
          - os: linux
            arch: arm64
            cc_target: aarch64-linux-gnu
            artifact: codex-continue-thinking-linux-arm64.so
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install zig CC
        run: |
          curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz \
            | tar xJ -C /tmp
          echo "/tmp/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      - name: Build ${{ matrix.target.artifact }}
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.target.os }} GOARCH=${{ matrix.target.arch }} \
            CC="zig cc -target ${{ matrix.target.cc_target }}" \
            go build -buildmode=c-shared -o /tmp/${{ matrix.target.artifact }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: /tmp/${{ matrix.target.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: codex-continue-thinking-*
          merge-multiple: true
          path: /tmp/artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/artifacts/codex-continue-thinking-linux-amd64.so
            /tmp/artifacts/codex-continue-thinking-linux-arm64.so
          generate_release_notes: true
          # Remove draft: false to publish immediately when tag is pushed
          draft: false
          prerelease: false
