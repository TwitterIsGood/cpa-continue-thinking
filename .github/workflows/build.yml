name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  PLUGIN_ID: codex-continue-thinking

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run tests
        run: go test ./...

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin-go
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: linux
            arch: amd64
            cc_target: x86_64-linux-gnu
          - os: linux
            arch: arm64
            cc_target: aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install zig CC
        run: |
          curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz \
            | tar xJ -C /tmp
          echo "/tmp/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      - name: Resolve version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=${PLUGIN_ID}_${VERSION}_${{ matrix.target.os }}_${{ matrix.target.arch }}.zip" >> $GITHUB_ENV

      - name: Build shared library
        run: |
          mkdir -p "${{ runner.temp }}/build"
          CGO_ENABLED=1 GOOS=${{ matrix.target.os }} GOARCH=${{ matrix.target.arch }} \
            CC="zig cc -target ${{ matrix.target.cc_target }}" \
            go build -buildmode=c-shared \
            -o "${{ runner.temp }}/build/${PLUGIN_ID}.so" .
          rm -f "${{ runner.temp }}/build/${PLUGIN_ID}.h"

      - name: Package plugin
        run: |
          zip -j "${ARCHIVE_NAME}" "${{ runner.temp }}/build/${PLUGIN_ID}.so"
          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: |
            plugin-go/${{ env.ARCHIVE_NAME }}
            plugin-go/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Prepare checksums
        run: |
          sort dist/*.sha256 > dist/checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.zip dist/checksums.txt --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.zip dist/checksums.txt \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
